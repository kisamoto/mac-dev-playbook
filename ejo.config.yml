  - jsonnet # JSON templating
  - jq
  - kotlin
  # - kubecfg # app from Bitnami for working with jsonnet on k8s
  - kubectx # easily switch between k8s clusters and namespaces
  - libevent
  - mosh
  - nmap
  - node
  - nvm
  # - openshift-cli
  # - php
  - ssh-copy-id
  - cowsay
  - readline
  - openssl
  - pipenv
  - pv
  - pwgen
  - python3
  - readline
  - reattach-to-user-namespace # for tmux
  - ripgrep # fast search, replace `pt`
  - ruby # overrite the default installation
  - rust
  # - source-to-image
  - speedtest-cli
  - sqlite
  - ssh-copy-id
  - stormssh
  - stripe/stripe-cli/stripe
  - task
  - terraform
  - terragrunt
  - thefuck
  - tmux
  - trash
  - tree
  - watch
  - wget
  - wrk
  - yarn
  - youtube-dl
  - z
  - zsh

homebrew_taps:
  - homebrew/core
  - homebrew/cask

homebrew_cask_appdir: /Applications
homebrew_cask_apps:
  - java # at the top for android dependency
  - appcode
  # - android-sdk
  - dash
  - datagrip
  - discord
  - chromedriver
  # - dropbox
  - firefox
  - flux
  - google-chrome
  - intellij-idea
