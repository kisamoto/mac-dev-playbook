---
downloads: ~/.ansible-downloads/

configure_dotfiles: true
configure_terminal: true
configure_osx: true

configure_sudoers: false
sudoers_custom_config: ""
# Example:
# sudoers_custom_config: |
#   # Allow users in admin group to use sudo with no password.
#   %admin ALL=(ALL) NOPASSWD: ALL

dotfiles_repo: https://github.com/kisamoto/dotfiles.git
dotfiles_repo_accept_hostkey: yes
dotfiles_repo_local_destination: ~/Development/github.com/kisamoto/dotfiles
dotfiles_files:
  - .aliases
  - .ansible.cfg
  - .bash_profile
  - .dash
  - .gitignore
  - .inputrc
  - .macos
  - .vim
  - .vimrc
  - .spacemacs
  - .taskrc
  - .tmux.conf
  - .zshrc

homebrew_installed_packages:
  - autoconf
  - awscli
  # - azure-cli
  - bash-completion
  - cookiecutter
  - cowsay
  - diff-so-fancy
  - dos2unix
  - emacs
  - exiftool
  - fd # alternative to find: https://github.com/sharkdp/fd
  - ffmpeg
  - fortune
  - gcc
  - git
  - glide
  - go
  - gpg
  - hammerspoon # Needed for the shiftit spoon https://github.com/peterklijn/hammerspoon-shiftit
  - htop
  - doxygen
  - gettext
  - gifsicle
  - git
  - github/gh/gh
  - gif-lfs
  - go
  - gpg
